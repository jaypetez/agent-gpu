name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9
        with:
          args: -color

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: "**/*.md"

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          config_file: .yamllint.yml

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--no-progress --max-concurrency 4 './**/*.md'"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  openapi:
    name: openapi
    runs-on: ubuntu-latest
    env:
      REDOCLY_TELEMETRY: "off"
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lint OpenAPI spec (validate 3.1 + recommended ruleset)
        uses: docker://redocly/cli:2.33.2@sha256:6ba52a89c87a37749cee3e31def1f10ad322a6c5418b008334c4694ae665086e
        with:
          args: lint openapi.yaml

      - name: Render OpenAPI docs (Redoc)
        uses: docker://redocly/cli:2.33.2@sha256:6ba52a89c87a37749cee3e31def1f10ad322a6c5418b008334c4694ae665086e
        with:
          args: build-docs openapi.yaml -o openapi.html

  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        # Race detector and coverage in one pass. covermode=atomic is required
        # under -race. The profile feeds the gate and report steps below.
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage report + threshold gate
        shell: bash
        # Generated protobuf code (proto/agentgpu/v1) is 0%-covered by design and
        # would unfairly drag the total down, so it is filtered out of the gate
        # metric. The job FAILS if total coverage drops below COVERAGE_MIN. That
        # floor is a deliberate RATCHET: it sits just under today's number and is
        # meant to be raised over time as coverage improves, never lowered to make
        # a red build pass.
        env:
          COVERAGE_MIN: "65.0"
        run: |
          set -euo pipefail

          # Drop generated proto from the gate metric, then compute the func table.
          grep -v 'proto/agentgpu/v1' coverage.out > coverage.gate.out
          go tool cover -func=coverage.gate.out > coverage.func.txt

          total="$(awk '/^total:/ { gsub(/%/, "", $3); print $3 }' coverage.func.txt)"
          if [ -z "$total" ]; then
            echo "could not parse total coverage from go tool cover output" >&2
            cat coverage.func.txt >&2
            exit 1
          fi

          # Render the run's coverage to the job summary: overall % plus the
          # per-package/per-func table (collapsed) so reviewers see it on each run.
          {
            echo "## Test coverage"
            echo ""
            echo "**Total (excl. generated proto): ${total}%** — gate floor ${COVERAGE_MIN}% (ratchet)."
            echo ""
            echo "<details><summary>Per-function coverage</summary>"
            echo ""
            echo '```text'
            cat coverage.func.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

          # Portable float compare via awk: fail when total < floor.
          if awk -v t="$total" -v min="$COVERAGE_MIN" 'BEGIN { exit !(t < min) }'; then
            echo "::error::coverage ${total}% is below the ${COVERAGE_MIN}% gate floor"
            exit 1
          fi
          echo "coverage ${total}% meets the ${COVERAGE_MIN}% gate floor"

      - name: Generate HTML coverage report
        if: always()
        shell: bash
        # Best-effort: only render if a profile was produced (skip when the test
        # step failed before writing one).
        run: |
          set -euo pipefail
          if [ -f coverage.out ]; then
            go tool cover -html=coverage.out -o coverage.html
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 7
          if-no-files-found: ignore

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: govulncheck
        # Reachability-based vulnerability scan over our packages plus the Go
        # standard library (the toolchain resolved above). Catches the
        # GO-YYYY-NNNN advisories the OpenSSF Scorecard OSV check reports, but
        # only when the vulnerable code is actually reachable — fewer false
        # positives than a pure manifest scan. Pinned for reproducibility.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build server image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: server
          push: false
          load: true
          tags: agentgpu-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}

      - name: Build worker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: worker
          push: false
          load: true
          tags: agentgpu-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}

      - name: Smoke-test images
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::server --help"
          docker run --rm agentgpu-server:ci --help
          echo "::endgroup::"

          echo "::group::worker --help"
          docker run --rm agentgpu-worker:ci --help
          echo "::endgroup::"

          echo "::group::server serves on 0.0.0.0 (expect 401 on /v1/models)"
          cid="$(docker run -d -p 8080:8080 agentgpu-server:ci)"
          code=""
          for _ in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/v1/models || true)"
            if [ "$code" = "401" ]; then break; fi
            if [ -z "$(docker ps -q --no-trunc --filter id="$cid")" ]; then
              echo "server container exited early; logs:"
              docker logs "$cid" || true
              docker rm -f "$cid" >/dev/null 2>&1 || true
              exit 1
            fi
            sleep 1
          done
          echo "GET /v1/models -> HTTP $code"
          docker logs "$cid"
          docker rm -f "$cid" >/dev/null
          echo "::endgroup::"

          if [ "$code" != "401" ]; then
            echo "expected HTTP 401 from a running, unauthenticated server, got '$code'" >&2
            exit 1
          fi

  compose:
    name: compose
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate compose.yaml
        run: docker compose config -q

      - name: End-to-end stack (up, register, persist, infer)
        shell: bash
        # The script brings the stack up, asserts a worker registers, proves a key
        # survives a server restart, pulls the tiny model, and runs a real chat
        # completion — then tears everything down. It is the same script behind
        # `make compose-e2e`, so CI and local runs exercise identical steps. Set
        # SKIP_INFERENCE=1 here if the model pull ever proves too slow/flaky for CI;
        # the up + registration + persistence assertions still run.
        run: AGENTGPU_MODEL=qwen2:0.5b ./scripts/compose-e2e.sh

      - name: Teardown
        if: always()
        shell: bash
        # The script tears down on its own EXIT trap; this is a belt-and-suspenders
        # cleanup so a crash before the trap installs never leaks the stack.
        run: docker compose down -v --remove-orphans || true

  release-dryrun:
    name: release-dryrun
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # GoReleaser needs full history/tags even for a snapshot build.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: check

      - name: Cross-compile all targets (no publish)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: build --snapshot --clean

  version-smoke:
    name: version-smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build binary
        run: go build -o agentgpu ./cmd/agentgpu

      - name: Run --version
        # bash is available on all three runners; keep the step portable.
        shell: bash
        run: |
          out="$(./agentgpu --version)"
          echo "$out"
          echo "$out" | grep -q "agentgpu" || { echo "missing program name"; exit 1; }
