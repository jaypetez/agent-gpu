name: Bug report
description: Report a problem with agent-gpu
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ..., I expected ..., but instead ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start the server with ...
        2. Register a worker ...
        3. Send request ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server
        - Worker
        - CLI
        - API
        - Scheduler
        - Docker
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: agent-gpu version or git commit SHA.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS/arch, GPU (NVIDIA/AMD/Apple/CPU), Ollama version, deployment (standalone/Docker).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
