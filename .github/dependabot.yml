version: 2
updates:
  # Keep GitHub Actions used in workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - infra
      - chore

  # Keep Go module dependencies up to date (routine version updates; security
  # updates flow separately via the GitHub Advisory Database).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build"
    labels:
      - dependencies

  # Keep the Dockerfile base images (the golang builder + distroless runtimes)
  # current; digests stay pinned for the Scorecard pinned-dependencies check.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - infra
      - chore
