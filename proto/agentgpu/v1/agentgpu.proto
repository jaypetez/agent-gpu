syntax = "proto3";

// Package agentgpu.v1 is the versioned contract for the agent-gpu internal
// control plane: the gRPC link between the central server and each worker.
//
// The public, OpenAI-compatible HTTP API is deliberately NOT modeled here —
// this package only covers the server<->worker plane (registration,
// heartbeats, job dispatch, and results). Later epics extend this same
// package; never break it without a version bump.
package agentgpu.v1;

option go_package = "github.com/jaypetez/agent-gpu/proto/agentgpu/v1;agentgpuv1";

// Model describes an inference model a worker can serve. The fields are
// intentionally minimal for the foundational milestone; scheduling-relevant
// metadata (VRAM footprint, quantization, etc.) is added by later epics.
message Model {
  // Canonical model name, e.g. "llama3".
  string name = 1;
  // Optional human-readable digest/revision of the model.
  string digest = 2;
}

// Error is a structured, transport-neutral error carried inside results.
// gRPC status codes cover transport failures; this models *job* failures.
message Error {
  // Machine-readable, stable error code (e.g. "model_not_found").
  string code = 1;
  // Human-readable message.
  string message = 2;
}

// ChatMessage is one entry in an OpenAI-style chat conversation, carried on a
// Job so chat semantics round-trip from the public API through the worker to
// Ollama and back. Added by the OpenAI-API epic (#13); additive to the plain
// prompt Job carried for /v1/completions and the foundational stub.
message ChatMessage {
  // Role of the author: "system", "user", "assistant", or "tool".
  string role = 1;
  // Text content of the message (may be empty for an assistant turn that only
  // carries tool_calls, or a tool result whose content is structured).
  string content = 2;
  // For a "tool" message: the id of the assistant tool call this result answers.
  string tool_call_id = 3;
  // Optional author name (e.g. the function name for a tool message).
  string name = 4;
  // For an "assistant" message replaying prior tool calls back to the model.
  repeated ToolCall tool_calls = 5;
}

// ToolFunction is the JSON-schema function definition the client offers the
// model. parameters_json is the function's JSON-schema parameter object encoded
// as a JSON string, kept opaque on the wire so the schema passes through
// unchanged.
message ToolFunction {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

// Tool is one tool the model may call. Only function tools exist today, so type
// is "function" and function carries the definition.
message Tool {
  string type = 1;
  ToolFunction function = 2;
}

// ToolCall is a function invocation the model emitted (response side) or a
// prior assistant tool call replayed to the model (request side).
// arguments_json is the call arguments encoded as a JSON string, opaque on the
// wire.
message ToolCall {
  string id = 1;
  string type = 2;
  string function_name = 3;
  string arguments_json = 4;
}

// Job is a single unit of inference work dispatched from server to worker.
message Job {
  // Server-assigned unique id for correlating dispatch with result.
  string id = 1;
  // Name of the model to run the job against.
  string model = 2;
  // Free-form prompt/input for /v1/completions and the foundational stub. The
  // chat schema below (messages, tools) is the OpenAI-API epic (#13) extension;
  // a chat job leaves prompt empty and carries messages instead.
  string prompt = 3;
  // OpenAI chat messages for /v1/chat/completions. Additive: when non-empty the
  // worker runs Ollama /api/chat with the full conversation; when empty the
  // plain prompt path is used (back-compat with the echo stub and #11).
  repeated ChatMessage messages = 4;
  // Tools (function definitions) the model may call. Threaded to Ollama
  // /api/chat so the model can emit tool_calls.
  repeated Tool tools = 5;
  // Model-warmth hint (#35): how long the worker should ask Ollama to keep the
  // model resident after this job, as a `keep_alive` duration in SECONDS. The
  // server sets it for session-bound turns (derived from the session's idle TTL)
  // so a model stays warm across an active conversation and unloads on its own
  // once the session goes idle; it is left 0 for session-less jobs. Semantics
  // mirror Ollama's keep_alive: 0 means "unset" — the worker omits keep_alive
  // and Ollama's default (5m) applies — a positive value keeps the model loaded
  // that many seconds (re-sent each turn, which resets Ollama's unload timer),
  // and a negative value keeps it loaded indefinitely. Additive and back-compat:
  // an unset (0) field reproduces the pre-#35 behavior exactly.
  int64 keep_alive_seconds = 6;
}

// JobResult is the worker's response to a dispatched Job.
message JobResult {
  // Echoes Job.id so the server can correlate.
  string job_id = 1;
  // The produced output (stub workers echo the prompt back).
  string output = 2;
  // Set when the job failed; output is then empty/partial.
  Error error = 3;
  // Number of tokens generated/consumed by this job, reported by the worker
  // for quota accounting (#5). The echo executor reports a whitespace token
  // count; real counts arrive with the Ollama integration (#11). Zero means
  // "no tokens reported".
  uint64 tokens = 4;
  // Tool calls the model emitted (OpenAI function-calling). Empty for an
  // ordinary text completion. Added by the OpenAI-API epic (#13).
  repeated ToolCall tool_calls = 5;
  // OpenAI finish_reason for this result: "stop", "length", "tool_calls", etc.
  // Empty when the worker reports none. Added by the OpenAI-API epic (#13).
  string finish_reason = 6;
  // Prompt-side token count (Ollama prompt_eval_count) for OpenAI usage
  // accounting; tokens above remains the total for quota. Zero if unknown.
  uint64 prompt_tokens = 7;
  // Completion-side token count (Ollama eval_count). Zero if unknown.
  uint64 completion_tokens = 8;
}

// JobChunk is an incremental piece of a streaming job's output, sent
// worker -> server as tokens are produced. The server accumulates the deltas
// per job_id and, on the terminal chunk (done = true), resolves the pending
// job waiter with the final JobResult. This carries inference output as a true
// stream rather than a single final JobResult so the request path (#13) can
// forward it to clients as SSE.
//
// Per-token chunks carry delta (and done = false); the final chunk carries
// done = true plus the total tokens count, or done = true plus error on
// failure. delta is empty on the terminal chunk.
message JobChunk {
  // Echoes Job.id so the server can correlate and accumulate.
  string job_id = 1;
  // Incremental output produced since the previous chunk (empty on the
  // terminal chunk).
  string delta = 2;
  // True on the final chunk for this job; no further chunks follow.
  bool done = 3;
  // Set on the terminal chunk when the job failed; accumulated output is then
  // discarded by the server in favor of the error.
  Error error = 4;
  // Total tokens generated/consumed by the job, reported on the terminal chunk
  // for quota accounting (#5). Zero means "no tokens reported".
  uint64 tokens = 5;
  // Tool calls the model emitted, carried on the terminal chunk so a streaming
  // function call surfaces as delta tool_calls + finish_reason "tool_calls".
  // Added by the OpenAI-API epic (#13).
  repeated ToolCall tool_calls = 6;
  // OpenAI finish_reason on the terminal chunk ("stop", "length",
  // "tool_calls"). Empty on non-terminal chunks. Added by the OpenAI-API epic.
  string finish_reason = 7;
  // Prompt/completion token split on the terminal chunk for OpenAI usage.
  uint64 prompt_tokens = 8;
  uint64 completion_tokens = 9;
}

// Register is the first message a worker sends on the stream. It identifies
// the worker and advertises the models it can serve.
message Register {
  // Stable, worker-chosen id (e.g. hostname or configured name).
  string worker_id = 1;
  // Models this worker can serve.
  repeated Model models = 2;
}

// RegisterAck acknowledges a successful registration.
message RegisterAck {
  // Server-assigned session id for this stream.
  string session_id = 1;
}

// Heartbeat is sent periodically by the worker to prove liveness and report
// load and capacity signals the server uses to mark workers stale and (in a
// later epic, #9) to schedule. Real GPU detection arrives with #16; until then
// workers report stub/configured capacity.
message Heartbeat {
  string worker_id = 1;
  // Number of jobs the worker is currently executing.
  uint32 active_jobs = 2;
  // Total VRAM on the worker's GPU(s), in bytes (0 = unknown).
  uint64 total_vram_bytes = 3;
  // Currently free VRAM, in bytes (0 = unknown).
  uint64 free_vram_bytes = 4;
  // Coarse load signal in the range 0-100 (0 = idle, 100 = saturated).
  uint32 load = 5;
  // Human-readable GPU type/description (e.g. "NVIDIA RTX 4090"); empty if
  // unknown.
  string gpu_type = 6;
  // Models the worker currently has available to serve. Lets the server's
  // fleet view reflect model availability without re-registration.
  repeated Model available_models = 7;
}

// Deregister is sent by a worker that is shutting down gracefully. The server
// marks the worker draining: it routes no new jobs to it, lets in-flight jobs
// finish, then removes it when the stream closes.
message Deregister {
  string worker_id = 1;
}

// PullModel instructs a worker to fetch a model onto its local Ollama. The
// server sends it only after authorizing the requesting key for the Pull
// action (#11); the worker pulls the model and refreshes its advertised model
// list on its next heartbeat. This is an additive, fire-and-forget control
// message; pull progress/results are not streamed back today.
message PullModel {
  // Name of the model to pull (e.g. "llama3").
  string model = 1;
}

// UnloadModel instructs a worker to evict a model from its local Ollama's
// memory now (keep_alive=0), freeing the VRAM (#35). The server sends it
// best-effort to a session's bound worker when that session is explicitly
// ended, so the conversation's model is released promptly rather than lingering
// for the remainder of its keep_alive window. Like PullModel it is additive and
// fire-and-forget: a missing/already-unloaded model is a no-op on the worker and
// no result is streamed back. The idle keep_alive timer remains the backstop
// release path, so a dropped UnloadModel still frees VRAM within the warm window.
message UnloadModel {
  // Name of the model to unload (e.g. "llama3").
  string model = 1;
}

// WorkerMessage is the worker -> server side of the bidi stream.
message WorkerMessage {
  oneof payload {
    Register register = 1;
    Heartbeat heartbeat = 2;
    JobResult result = 3;
    Deregister deregister = 4;
    JobChunk chunk = 5;
  }
}

// ServerMessage is the server -> worker side of the bidi stream.
message ServerMessage {
  oneof payload {
    RegisterAck register_ack = 1;
    Job job = 2;
    PullModel pull_model = 3;
    UnloadModel unload_model = 4;
  }
}

// ControlPlane is the internal server<->worker service. A worker opens one
// persistent bidirectional stream and keeps it open; the server pushes job
// dispatches down it and the worker pushes registration, heartbeats, and
// results up it.
service ControlPlane {
  // Connect establishes the single long-lived control stream for a worker.
  rpc Connect(stream WorkerMessage) returns (stream ServerMessage);
}
